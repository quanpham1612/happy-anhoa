<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Planet & 8/3 Ngày phụ nữ</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff6b8b'/%3E%3Cstop offset='1' stop-color='%23ff3366'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%23ffeff3'/%3E%3Cpath fill='url(%23g)' d='M32 48s-9.5-6.4-15.1-12.3C12.2 31.8 10 28.5 10 24.5 10 19.8 13.8 16 18.5 16c2.9 0 5.7 1.5 7.5 3.9C27.8 17.5 30.6 16 33.5 16 38.2 16 42 19.8 42 24.5c0 4-2.2 7.3-6.9 11.2C41.5 41.6 32 48 32 48z'/%3E%3C/svg%3E">

    <!-- Font & icon cho phần thiệp -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Riot&family=Rubik+Glitch+Pop&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Protest+Revolution&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Pacifico&family=Protest+Revolution&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Three.js cho phần vũ trụ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* Overlay chuyển cảnh chung cho 2 phần */
        #transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            z-index: 10000;
            transition: all 1.5s ease;
            pointer-events: none;
        }

        #transition-overlay.active {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
        }

        #transition-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            color: white;
            font-size: 2.5rem;
            font-family: 'Dancing Script', cursive;
            text-align: center;
            z-index: 10001;
            transition: all 1s ease;
            white-space: nowrap;
        }

        #transition-text.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #transition-text span {
            color: #ff3366;
            display: block;
            font-size: 3rem;
            margin-top: 10px;
            text-shadow: 0 0 20px #ff3366;
        }

        @media (max-width: 768px) {
            #transition-text {
                font-size: 1.8rem;
            }

            #transition-text span {
                font-size: 2.2rem;
            }
        }

        /* ================== PHẦN THIỆP (rút gọn từ thiep.html) ================== */
        .valentine-container {
            position: relative;
            min-height: 100vh;
            width: 100%;
            background-color: #fc6885;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        .paperHeart {
            position: absolute;
            height: 70px;
            top: 100%;
            opacity: 0;
            filter: drop-shadow(0 0 15px white);
            animation: hiddenHeart 3.1s linear forwards, flyHeart 5s ease-in-out calc(var(--time) + 3.1s) infinite;
            z-index: 1;
            pointer-events: none;
        }

        .paperHeart1 { left: 10%; }
        .paperHeart2 { left: 25%; }
        .paperHeart3 { left: 40%; }
        .paperHeart4 { left: 55%; }
        .paperHeart5 { left: 70%; }
        .paperHeart6 { left: 85%; }

        .boxTitle {
            position: relative;
            margin-top: 60px;
            width: 90%;
            font-family: "Rubik Glitch Pop", system-ui;
            font-weight: 400;
            font-style: normal;
            font-size: clamp(40px, 10vw, 80px);
            color: pink;
            text-align: center;
            text-shadow: 0 0 20px white;
            animation: appearTitle 2s linear 3.1s forwards, floatingWords 4s ease-in-out infinite;
            z-index: 2;
            line-height: 1.2;
        }

        .partTitle {
            display: block;
            line-height: 1.2;
        }

        .firstTitle { margin-bottom: 10px; }

        .cardValentine {
            position: fixed;
            top: 200%;
            left: 50%;
            opacity: 0;
            transform: translate(-50%, -50%);
            height: 500px;
            width: 90%;
            max-width: 800px;
            background-color: transparent;
            transition: opacity 0.5s ease;
            perspective: 1000px;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
            z-index: 10;
            visibility: hidden;
            transform: translate(-50%, -50%) rotate(-1.5deg);
        }

        .cardValentine.active {
            top: 46%;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease 0.3s;
            animation: none;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s ease;
        }

        .cardValentine.open .card-inner {
            transform: rotateY(-180deg);
        }

        .cardValentine .left {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff6b8b, #ff4757);
            border-radius: 15px;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .cardValentine .left::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path fill="rgba(255,255,255,0.05)" d="M50,30 Q70,20 80,40 Q90,60 70,70 Q50,80 30,70 Q10,60 20,40 Q30,20 50,30 Z"/></svg>');
            background-size: 60px;
            opacity: 0.2;
        }

        .heart-icon-container {
            font-size: clamp(50px, 8vw, 70px);
            color: white;
            margin-bottom: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .card-title-front {
            text-align: center;
            color: white;
            font-family: "Dancing Script", cursive;
            margin-bottom: 30px;
        }

        .card-title-front h1 {
            font-size: clamp(32px, 6vw, 48px);
            margin-bottom: 5px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .card-title-front h2 {
            font-size: clamp(28px, 5vw, 36px);
            font-weight: normal;
            letter-spacing: 2px;
        }

        .tap-instruction {
            position: absolute;
            bottom: 20px;
            font-family: "Pacifico", cursive;
            font-size: clamp(16px, 3vw, 18px);
            color: white;
            text-align: center;
            width: 100%;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .tap-instruction i {
            margin-right: 8px;
            animation: bounce 2s infinite;
        }

        .cardValentine .right {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fff5f7, #ffeef1);
            border-radius: 15px;
            backface-visibility: hidden;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .rightContent {
            flex: 1;
            background-color: white;
            border-radius: 10px;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
        }

        .letter-header {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #ffccd5;
            flex-shrink: 0;
        }

        .letter-header h3 {
            font-family: "Dancing Script", cursive;
            font-size: clamp(24px, 5vw, 32px);
            color: #ff4757;
            margin-bottom: 8px;
        }

        .heart-divider {
            display: flex;
            justify-content: center;
            gap: 10px;
            color: #ff8fa3;
            font-size: 12px;
        }

        .letterContent {
            flex: 1;
            font-family: "Pacifico", cursive;
            font-size: clamp(15px, 2.9vw, 18px);
            line-height: 1.8;
            color: #555;
            text-align: justify;
            padding: 8px 4px 10px;
            overflow-y: auto;
            white-space: pre-line;
        }

        .letterContent::-webkit-scrollbar { width: 5px; }
        .letterContent::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #ff8fa3, #ff6b8b);
            border-radius: 3px;
        }

        .letter-footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #ffccd5;
            text-align: center;
            font-family: "Dancing Script", cursive;
            color: #ff6b8b;
            flex-shrink: 0;
        }

        .signature {
            font-size: clamp(22px, 4vw, 26px);
            margin: 8px 0;
            color: #ff4757;
        }

        .valentine-date {
            font-size: clamp(14px, 2.5vw, 16px);
            color: #ff8fa3;
        }

        .btnContainer {
            position: relative;
            margin: 55px auto 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
            width: 100%;
            max-width: 520px;
            padding: 0 16px;
        }

        .btnContainer,
        .btnContainer * {
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        .btnContainer::before {
            content: "";
            position: absolute;
            inset: -12px;
            border-radius: 30px;
        }

        .openBtn {
            position: relative;
            width: 100%;
            height: 130px;
            font-family: "Dancing Script", cursive;
            font-weight: 700;
            font-size: clamp(30px, 5.5vw, 36px);
            color: white;
            background: linear-gradient(135deg, #ff6b8b, #ff4757);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            z-index: 5;
            padding: 20px 30px;
            box-shadow:
                0 10px 24px rgba(255, 107, 139, 0.5),
                0 6px 16px rgba(0, 0, 0, 0.2),
                inset 0 0 18px rgba(255, 255, 255, 0.35);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .openBtn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .openBtn:hover::before { left: 100%; }

        .openBtn i {
            font-size: clamp(28px, 4.5vw, 36px);
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .openBtn .button-text {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .close-card-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            border: none;
            color: #ff4757;
            font-size: 20px;
            cursor: pointer;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        .close-card-btn:hover {
            transform: scale(1.1);
            background: white;
        }

        .valentine-container.close .btnContainer {
            animation: disappearBtn 0.8s ease forwards;
            opacity: 0;
            visibility: hidden;
        }

        .valentine-container.close .boxTitle {
            animation: disappearBoxTitle 0.8s ease forwards;
            opacity: 0;
            visibility: hidden;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes disappearBtn {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.8); }
        }

        @keyframes disappearBoxTitle {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        @keyframes appearTitle {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatingWords {
            0% { transform: translateY(0); }
            25% { transform: translateY(-8px); }
            50% { transform: translateY(8px); }
            75% { transform: translateY(0); }
        }

        @keyframes flyHeart {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        @keyframes hiddenHeart {
            0% { opacity: 0; }
            95% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* ================== PHẦN VŨ TRỤ (từ vutru.html) ================== */
        #universe-section {
            width: 100vw;
            height: 100vh;
            display: none;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        canvas { display: block; }

        .ui-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        .ui-overlay * { pointer-events: auto; }

        .loading {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 70%, rgba(30,10,40,0.9), #000 70%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .loading.hidden { opacity: 0; pointer-events: none; }

        .loader-content {
            text-align: center;
            max-width: 380px;
            padding: 30px 20px;
            background: rgba(15,5,25,0.75);
            border-radius: 24px;
            border: 1px solid rgba(255,51,102,0.4);
            box-shadow: 0 0 90px rgba(255,51,102,0.45),
                        inset 0 0 40px rgba(255,153,204,0.12);
            backdrop-filter: blur(14px);
        }

        .cosmic-spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border: 6px solid rgba(255,51,102,0.2);
            border-top: 6px solid #ff3366;
            border-radius: 50%;
            animation: spin 1.35s cubic-bezier(0.55, 0.1, 0.68, 0.9) infinite;
            box-shadow: 0 0 35px #ff99cc;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-title {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff3366, #ff99cc, #ff66aa, #ff3366);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 4s ease infinite;
            text-shadow: 0 0 25px rgba(255,51,102,0.8);
            margin-bottom: 16px;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .loading-subtitle {
            font-size: 1.05rem;
            color: #ffccdd;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .progress-container {
            width: 280px;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3366, #ff66aa, #ff99cc);
            background-size: 200% 100%;
            animation: progressShine 3s linear infinite;
            transition: width 0.35s ease;
        }

        @keyframes progressShine {
            0% { background-position: 0% 0; }
            100% { background-position: -200% 0; }
        }

        .notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(12px);
            padding: 14px 32px;
            border-radius: 50px;
            border: 1px solid #ff3366;
            color: #fff;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.6s ease;
            font-size: 0.94rem;
            text-align: center;
            max-width: 85%;
            box-shadow: 0 8px 35px rgba(255,51,102,0.4);
        }

        .notification.show { opacity: 1; }

        .float-action-btn {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff3366, #ff66aa);
            border: none;
            border-radius: 50px;
            padding: 16px 40px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 6px 25px rgba(255, 51, 102, 0.4);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            min-width: 220px;
            text-align: center;
            touch-action: manipulation;
        }

        .float-action-btn:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 51, 102, 0.6);
            background: linear-gradient(135deg, #ff2266, #ff5599);
        }

        .float-action-btn:active {
            transform: translateX(-50%) translateY(1px);
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
            background: linear-gradient(135deg, #ff1166, #ff4488);
        }

        .float-action-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: linear-gradient(135deg, #aa2244, #cc4488);
        }
    </style>
</head>
<body>
    <!-- Overlay chuyển cảnh chung -->
    <div id="transition-overlay"></div>
    <div id="transition-text">
        Chuyển đến Vũ trụ
        <span>Love Planet...</span>
    </div>

    <!-- PHẦN THIỆP -->
    <div id="valentine-section">
        <div class="valentine-container">
            <!-- Tim bay -->
            <img class="paperHeart paperHeart1" style="--time: 0s" src="./img/paperHeart.png" alt="Trái tim">
            <img class="paperHeart paperHeart2" style="--time: 1s" src="./img/paperHeart.png" alt="Trái tim">
            <img class="paperHeart paperHeart3" style="--time: 2.5s" src="./img/paperHeart.png" alt="Trái tim">
            <img class="paperHeart paperHeart4" style="--time: 4s" src="./img/paperHeart.png" alt="Trái tim">
            <img class="paperHeart paperHeart5" style="--time: 2s" src="./img/paperHeart.png" alt="Trái tim">
            <img class="paperHeart paperHeart6" style="--time: 3s" src="./img/paperHeart.png" alt="Trái tim">

            <!-- Tiêu đề -->
            <div class="boxTitle">
                <span class="firstTitle partTitle">Happy</span>
                <span class="secondTitle partTitle">women's day 8.3</span>
            </div>

            <!-- Nút mở thiệp -->
            <div class="btnContainer">
                <button class="openBtn">
                    <i class="fas fa-heart"></i>
                    <span class="button-text">Mở thiệp nè</span>
                </button>
            </div>

            <!-- Thiệp -->
            <div class="cardValentine">
                <button class="close-card-btn">
                    <i class="fas fa-times"></i>
                </button>

                <div class="card-inner">
                    <div class="left">
                        <div class="heart-icon-container">
                            <i class="fas fa-heart"></i>
                        </div>
                        <div class="card-title-front">
                            <h1>happy women's day</h1>
                            <h2>8/3</h2>
                        </div>
                        <p class="tap-instruction">
                            <i class="fas fa-hand-point-up"></i> Chạm để mở thiệp
                        </p>
                    </div>

                    <div class="right">
                        <div class="rightContent">
                            <div class="letter-header">
                                <h3><i class="fas fa-envelope"></i></h3>
                                <div class="heart-divider">
                                    <i class="fas fa-heart"></i>
                                    <i class="fas fa-heart"></i>
                                    <i class="fas fa-heart"></i>
                                </div>
                            </div>
                            <div class="letterContent"></div>
                            <div class="letter-footer">
                                <div class="signature">Yêu lắm bé iu của anh ❤️</div>
                                <div class="valentine-date">8 tháng 3, 2026</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PHẦN VŨ TRỤ -->
    <div id="universe-section">
        <div id="container">
            <div id="canvas-container"></div>

            <div class="ui-overlay">
                <button class="float-action-btn" id="floatBtn">✨ Bấm đây đi ✨</button>
            </div>

            <div class="loading" id="loading">
                <div class="loader-content">
                    <div class="cosmic-spinner"></div>
                    <div class="loading-title">Đợi xíu</div>
                    <div class="loading-subtitle" id="loading-text">Đang hình thành vũ trụ</div>
                    <div class="progress-container">
                        <div class="progress-bar" id="loading-bar"></div>
                    </div>
                </div>
            </div>

            <div class="notification" id="notification">Chào mừng đến với Love Planet</div>
        </div>
    </div>

    <!-- Audio ẩn -->
    <div style="position: fixed; top: -100px; left: -100px; width: 0; height: 0; opacity: 0; pointer-events: none;">
        <audio id="bg-music" preload="auto" loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // ====================== BIẾN CHUNG ======================
        let transitionStarted = false;
        let universeStarted = false;

        // ====================== PHẦN THƯ ======================
        var letterContent = `Gửi An Hòa người anh yêu nhất,
Chúc em một ngày 8/3 thật nhiều niềm vui,luôn xinh đẹp, rạng rỡ và hạnh phúc.
Cảm ơn em đã đến bên anh,ang đến cho anh thật nhiều tiếng cười và những khoảnh khắc ấm áp.
Với anh, em luôn là người đặc biệt và quan trọng nhất.
Mong rằng mỗi ngày của em đều tràn đầy yêu thương, bình yên và những điều tốt đẹp.
Anh sẽ luôn ở bên, quan tâm, che chở và cùng em đi qua thật nhiều chặng đường phía trước. 💐💖
                                 Mãi yêu em... ❤️`;

        var durationWrite = 35;
        var isWriting = false;
        var writeTimeouts = [];

        function stopWritingEffect() {
            writeTimeouts.forEach(function(timeout) {
                clearTimeout(timeout);
            });
            writeTimeouts = [];
            isWriting = false;
        }

        function effectWrite() {
            if (isWriting) return;

            isWriting = true;
            var boxLetter = document.querySelector(".letterContent");
            var letterContentSplited = letterContent.split("");

            stopWritingEffect();
            boxLetter.innerHTML = "";

            var totalDuration = durationWrite * letterContentSplited.length;

            letterContentSplited.forEach(function(val, index) {
                var timeout = setTimeout(function() {
                    boxLetter.innerHTML += val;

                    var rightContent = document.querySelector(".letterContent");
                    rightContent.scrollTop = rightContent.scrollHeight;

                    if (index === letterContentSplited.length - 1) {
                        isWriting = false;
                        setTimeout(function() {
                            if (!transitionStarted) {
                                startTransition();
                            }
                        }, 2000);
                    }
                }, durationWrite * index);

                writeTimeouts.push(timeout);
            });

            setTimeout(function() {
                if (!transitionStarted) {
                    startTransition();
                }
            }, totalDuration + 5000);
        }

        function resetLetterContent() {
            var boxLetter = document.querySelector(".letterContent");
            boxLetter.innerHTML = "";
            stopWritingEffect();
        }

        // ====================== AUDIO ======================
        const audio = document.getElementById('bg-music');
        if (audio) {
            audio.volume = 0.7;
        }

        function playMusic() {
            if (!audio) return;

            audio.muted = false;
            audio.volume = 0.7;
            audio.load();

            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log('Lần phát đầu thất bại, đang thử lại:', error);
                    setTimeout(() => {
                        audio.play().catch(e => console.log('Lỗi phát nhạc:', e));
                    }, 100);
                });
            }
        }

        function unmuteAndPlay() {
            if (!audio) return;
            audio.muted = false;
            audio.volume = 0.7;
            playMusic();

            document.removeEventListener('click', unmuteAndPlay);
            document.removeEventListener('keydown', unmuteAndPlay);
            document.removeEventListener('touchstart', unmuteAndPlay);
            document.removeEventListener('mousemove', unmuteAndPlay);
            document.removeEventListener('scroll', unmuteAndPlay);
        }

        (function initAudio() {
            if (!audio) return;
            audio.preload = 'auto';
            audio.loop = true;
            audio.muted = false;
            audio.volume = 0.7;

            playMusic();

            document.addEventListener('click', unmuteAndPlay, { once: true });
            document.addEventListener('keydown', unmuteAndPlay, { once: true });
            document.addEventListener('touchstart', unmuteAndPlay, { once: true });
            document.addEventListener('mousemove', unmuteAndPlay, { once: true });
            document.addEventListener('scroll', unmuteAndPlay, { once: true });

            let retryCount = 0;
            const retryInterval = setInterval(() => {
                if (audio.paused && retryCount < 10) {
                    console.log(`Fallback lần ${retryCount + 1}: Đang thử phát lại...`);
                    playMusic();
                    retryCount++;
                } else if (!audio.paused) {
                    console.log('Âm nhạc đã phát thành công!');
                    clearInterval(retryInterval);
                }

                if (retryCount >= 10) {
                    clearInterval(retryInterval);
                }
            }, 1000);
        })();

        setInterval(() => {
            if (audio && audio.paused && !transitionStarted) {
                console.log('Phát hiện nhạc bị dừng, đang phát lại...');
                playMusic();
            }
        }, 3000);

        // ====================== PHẦN VŨ TRỤ ======================
        let scene, camera, renderer, controls;
        let planetCore, pinkNebulaDisk, stars;
        let imageMeshes = [];
        let imageTextures = [];
        let animationId = null;
        let isFloatingMode = false;
        let floatAnimationId = null;

        const RED_NEBULA_COLOR   = 0xfe003f;
        const PINK_NEBULA_COLOR  = 0xff99cc;
        const HOT_PINK           = 0xff33aa;

        const CONFIG = {
            coreRadius: 8,
            diskInnerRadius: 8,
            diskOuterRadius: 100,
            diskHeight: 1,
            copiesPerImage: 50,
            baseImageScale: 3.0,
            imageOpacity: 0.92,
            imageGlowIntensity: 0.4,
            coreRotationSpeed: 0.0002,
            diskRotationSpeed: -0.0012,
            starRotationSpeed: 0.00008,
            safeDistanceFromCore: 9,
            minDistanceBetweenImages: 2.5,
            starCount: 8000,
            nebulaParticleCount: 15000,
            imageFloatAmplitude: 0,
            imageFloatSpeed: 0
        };

        const FLOAT_CONFIG = {
            coreRotationSpeedBoost: 5,
            diskRotationSpeed: 0,
            floatHeight: { min: 15, max: 40 },
            floatDuration: 3500,
            cameraZoomDistance: 200,
            floatSpeed: 0.4,
            keepImagesStatic: true
        };

        function initUniverse() {
            if (universeStarted) return;
            universeStarted = true;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.Fog(0x000000, 80, 350);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1200);
            camera.position.set(40, 30, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.06;
            controls.rotateSpeed = 0.55;
            controls.minDistance = 18;
            controls.maxDistance = 180;
            controls.maxPolarAngle = Math.PI * 0.82;

            setupLights();
            createRedNebulaCore();
            createPinkNebulaDisk();
            createStars();

            loadImagesFromDirectory();
            animate();

            window.addEventListener('resize', onWindowResize);

            const floatBtn = document.getElementById('floatBtn');
            floatBtn.addEventListener('click', startFloatEffect);
        }

        function setupLights() {
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            const dir = new THREE.DirectionalLight(0xffffff, 1.2);
            dir.position.set(22, 35, 18);
            scene.add(dir);

            const pinkPoint = new THREE.PointLight(HOT_PINK, 2.8, 300);
            pinkPoint.position.set(28, 22, 30);
            scene.add(pinkPoint);

            const corePoint = new THREE.PointLight(RED_NEBULA_COLOR, 3.5, 180);
            corePoint.position.set(0, 0, 0);
            scene.add(corePoint);

            const topPoint = new THREE.PointLight(0xffffff, 1.5, 180);
            topPoint.position.set(0, 12, 0);
            scene.add(topPoint);
        }

        function generateCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            gradient.addColorStop(0,   'rgba(255,255,255,1)');
            gradient.addColorStop(0.25,'rgba(255,255,255,0.85)');
            gradient.addColorStop(0.7, 'rgba(255,255,255,0.4)');
            gradient.addColorStop(1,   'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 128, 128);
            return new THREE.CanvasTexture(canvas);
        }

        function createRedNebulaCore() {
            const count = 4800;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count*3);
            const col = new Float32Array(count*3);
            const siz = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                const i3 = i*3;
                const r = CONFIG.coreRadius * (0.7 + Math.random()*0.3);
                const theta = Math.random()*Math.PI*2;
                const phi = Math.acos(2*Math.random()-1);
                pos[i3  ] = r * Math.sin(phi) * Math.cos(theta);
                pos[i3+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i3+2] = r * Math.cos(phi);

                const br = 0.85 + Math.random()*0.5;
                const color = new THREE.Color(RED_NEBULA_COLOR).multiplyScalar(br);
                col[i3] = color.r; col[i3+1] = color.g; col[i3+2] = color.b;
                siz[i] = 0.12 + Math.random()*0.14;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
            geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
            geo.setAttribute('size',     new THREE.BufferAttribute(siz,1));

            const mat = new THREE.PointsMaterial({
                map: generateCircleTexture(),
                size: 0.42,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true,
                opacity: 0.55
            });

            planetCore = new THREE.Points(geo, mat);
            scene.add(planetCore);
        }

        function createPinkNebulaDisk() {
            pinkNebulaDisk = new THREE.Group();

            const count = CONFIG.nebulaParticleCount;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count*3);
            const col = new Float32Array(count*3);
            const siz = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                const i3 = i*3;
                const r = CONFIG.diskInnerRadius + Math.random() * (CONFIG.diskOuterRadius - CONFIG.diskInnerRadius);
                const a = Math.random()*Math.PI*2;
                const h = (Math.random()-0.5) * CONFIG.diskHeight;

                pos[i3  ] = Math.cos(a) * r;
                pos[i3+1] = h;
                pos[i3+2] = Math.sin(a) * r;

                const br = 0.8 + Math.random()*0.6;
                const colors = [0xff3366];
                const c = new THREE.Color(colors[Math.floor(Math.random()*colors.length)]).multiplyScalar(br);
                col[i3] = c.r; col[i3+1] = c.g; col[i3+2] = c.b;

                const sf = 1 - (r - CONFIG.diskInnerRadius)/(CONFIG.diskOuterRadius - CONFIG.diskInnerRadius);
                siz[i] = 0.14 + Math.random() * 0.18 * sf;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
            geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
            geo.setAttribute('size',     new THREE.BufferAttribute(siz,1));

            const mat = new THREE.PointsMaterial({
                map: generateCircleTexture(),
                size: 0.38,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true,
                opacity: 0.92
            });

            pinkNebulaDisk.add(new THREE.Points(geo, mat));
            scene.add(pinkNebulaDisk);
        }

        function createStars() {
            const count = CONFIG.starCount;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count*3);
            const col = new Float32Array(count*3);
            const siz = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                const i3 = i*3;
                pos[i3  ] = (Math.random()-0.5)*1200;
                pos[i3+1] = (Math.random()-0.5)*1200;
                pos[i3+2] = (Math.random()-0.5)*1200;

                const rand = Math.random();
                if (rand < 0.12) {
                    col[i3  ] = 0.95; col[i3+1] = 0.6 + rand*0.3; col[i3+2] = 0.8 + rand*0.15;
                } else {
                    col[i3  ] = 0.7 + Math.random()*0.15;
                    col[i3+1] = 0.75 + Math.random()*0.15;
                    col[i3+2] = 0.9 + Math.random()*0.1;
                }

                siz[i] = 0.04 + Math.random() * 0.10;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
            geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
            geo.setAttribute('size',     new THREE.BufferAttribute(siz,1));

            const mat = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true,
                opacity: 0.65
            });

            stars = new THREE.Points(geo, mat);
            scene.add(stars);
        }

        async function discoverImagesInDirectory() {
            return [
                './img/photo1.jpg.jpg',
                './img/photo2.jpg.jpg',
                './img/photo3.jpg.jpg',
                './img/photo4.jpg.jpg',
                './img/photo5.jpg.jpg',
                './img/photo6.jpg.jpg',
                './img/photo7.jpg.jpg',
                './img/photo8.jpg.jpg',
                './img/photo9.jpg.jpg',
                './img/photo10.jpg.jpg',
                './img/photo11.jpg.jpg',
                './img/photo12.jpg.jpg',
            ];
        }

        async function loadImagesFromDirectory() {
            try {
                updateLoading('Đang quét ảnh...', 5);
                const list = await discoverImagesInDirectory();

                if (list.length === 0) {
                    createSampleImages();
                    return;
                }

                updateLoading(`Tìm thấy ${list.length} ảnh`, 18);
                await loadAndCreateTextures(list);
                distributeImagesOnDisk();

                updateLoading('Vũ trụ đã sẵn sàng!', 100);
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 800);
            } catch (err) {
                console.error(err);
                createSampleImages();
                updateLoading('Sử dụng ảnh mẫu', 100);
                setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1200);
            }
        }

        async function loadAndCreateTextures(list) {
            const loader = new THREE.TextureLoader();
            for (let i = 0; i < list.length; i++) {
                updateLoading(`Đang tải ảnh ${i+1}/${list.length}`, 20 + (i/list.length)*65);

                try {
                    const tex = await loader.loadAsync(list[i]);
                    tex.needsUpdate = true;
                    if (tex.image) {
                        tex.userData = {
                            width: tex.image.width,
                            height: tex.image.height,
                            aspectRatio: tex.image.width / tex.image.height
                        };
                    }
                    imageTextures.push(tex);
                } catch {
                    imageTextures.push(createFallbackTexture(i));
                }
            }
        }

        function createFallbackTexture(idx) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 768;
            const ctx = canvas.getContext('2d');
            const hue = (idx * 137.5) % 360;
            const grad = ctx.createLinearGradient(0,0,1024,768);
            grad.addColorStop(0, `hsl(${hue}, 85%, 38%)`);
            grad.addColorStop(1, `hsl(${(hue+55)%360}, 85%, 58%)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,1024,768);

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 220px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('❤', 512, 384);

            ctx.font = 'bold 80px Arial';
            ctx.fillText(`${idx+1}`, 512, 520);

            const tex = new THREE.CanvasTexture(canvas);
            tex.userData = { width:1024, height:768, aspectRatio:1024/768 };
            return tex;
        }

        function createSampleImages() {
            for (let i = 0; i < 8; i++) {
                imageTextures.push(createFallbackTexture(i));
            }
            distributeImagesOnDisk();
        }

        function createImageMesh(texture, position) {
            let w = CONFIG.baseImageScale;
            let h = CONFIG.baseImageScale * 0.78;

            if (texture.userData?.aspectRatio) {
                const ar = texture.userData.aspectRatio;
                if (ar > 1.25)      { w *= 1.22; h *= 0.78; }
                else if (ar < 0.8)  { w *= 0.78; h *= 1.22; }
                else                { w = h = CONFIG.baseImageScale; }
            }

            const geo = new THREE.PlaneGeometry(w, h, 32, 32);
            const mat = new THREE.MeshBasicMaterial({
                map: texture,
                transparent: true,
                side: THREE.DoubleSide,
                opacity: CONFIG.imageOpacity,
                depthWrite: false
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(position);
            mesh.lookAt(new THREE.Vector3(0, position.y, 0));
            mesh.rotation.y += Math.PI;

            const glowGeo = new THREE.PlaneGeometry(w*1.18, h*1.18, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                side: THREE.DoubleSide,
                opacity: 0.12,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.copy(position);
            glow.rotation.copy(mesh.rotation);

            const group = new THREE.Group();
            group.add(glow);
            group.add(mesh);

            group.userData = {
                originalPosition: position.clone(),
                originalRotation: mesh.rotation.clone(),
                radius: Math.sqrt(position.x**2 + position.z**2),
                angle: Math.atan2(position.z, position.x),
                targetHeight: position.y,
                floating: false,
                floatProgress: 0,
                floatSpeed: 0.3 + Math.random() * 0.4,
                originalScale: new THREE.Vector3(1, 1, 1),
                initialRotation: mesh.rotation.clone()
            };

            return group;
        }

        function distributeImagesOnDisk() {
            if (!imageTextures.length) return;

            const totalTextures = imageTextures.length;
            const totalInstances = totalTextures * CONFIG.copiesPerImage;
            const positions = generateDistributedPositions(totalInstances);

            for (let i = 0; i < totalInstances; i++) {
                const tex = imageTextures[i % totalTextures];
                const pos = positions[i];
                const imgGroup = createImageMesh(tex, pos);
                pinkNebulaDisk.add(imgGroup);
                imageMeshes.push(imgGroup);
            }
        }

        function generateDistributedPositions(total) {
            const positions = [];
            const attemptsPerSlot = 80;
            const minDist = CONFIG.minDistanceBetweenImages;

            for (let i = 0; i < total; i++) {
                let placed = false;
                let tries = 0;

                while (!placed && tries < attemptsPerSlot) {
                    tries++;
                    const r = CONFIG.diskInnerRadius + 3 + Math.random() * (CONFIG.diskOuterRadius - CONFIG.diskInnerRadius - 6);
                    const ang = Math.random() * Math.PI * 2;
                    const y = (Math.random() - 0.5) * CONFIG.diskHeight * 0.5;

                    const x = Math.cos(ang) * r;
                    const z = Math.sin(ang) * r;

                    if (Math.sqrt(x*x + z*z) < CONFIG.safeDistanceFromCore) continue;

                    let tooClose = false;
                    for (const p of positions) {
                        const dx = x - p.x;
                        const dy = y - p.y;
                        const dz = z - p.z;
                        if (Math.sqrt(dx*dx + dy*dy + dz*dz) < minDist) {
                            tooClose = true;
                            break;
                        }
                    }

                    if (!tooClose) {
                        positions.push(new THREE.Vector3(x, y, z));
                        placed = true;
                    }
                }

                if (!placed) {
                    const r = CONFIG.diskInnerRadius + 6 + Math.random() * (CONFIG.diskOuterRadius - CONFIG.diskInnerRadius - 12);
                    const ang = Math.random() * Math.PI * 2;
                    const x = Math.cos(ang) * r;
                    const z = Math.sin(ang) * r;
                    const y = (Math.random() - 0.5) * CONFIG.diskHeight * 0.4;
                    positions.push(new THREE.Vector3(x, y, z));
                }
            }
            return positions;
        }

        function startFloatEffect() {
            if (isFloatingMode) return;

            isFloatingMode = true;
            const btn = document.getElementById('floatBtn');
            btn.disabled = true;
            btn.textContent = '✨ 8/3 vui vẻ nhé ✨';

            const originalCoreSpeed = CONFIG.coreRotationSpeed;

            CONFIG.coreRotationSpeed *= FLOAT_CONFIG.coreRotationSpeedBoost;
            CONFIG.diskRotationSpeed = FLOAT_CONFIG.diskRotationSpeed;

            imageMeshes.forEach(mesh => {
                mesh.userData.floating = true;
                mesh.userData.floatProgress = 0;

                const floatAmount = FLOAT_CONFIG.floatHeight.min +
                    Math.random() * (FLOAT_CONFIG.floatHeight.max - FLOAT_CONFIG.floatHeight.min);

                mesh.userData.targetHeight = mesh.position.y + floatAmount;

                if (mesh.children[1] && mesh.children[1].material) {
                    mesh.children[1].material.opacity = Math.min(1, CONFIG.imageOpacity + 0.2);
                }
                if (mesh.children[0] && mesh.children[0].material) {
                    mesh.children[0].material.opacity = 0.25;
                }
            });

            const startPos = camera.position.clone();
            const targetPos = camera.position.clone().normalize().multiplyScalar(FLOAT_CONFIG.cameraZoomDistance);
            targetPos.y = Math.max(targetPos.y, 60);

            let cameraProgress = 0;
            const cameraAnimation = () => {
                cameraProgress += 0.008;
                camera.position.lerpVectors(startPos, targetPos, cameraProgress);

                if (cameraProgress < 1) {
                    requestAnimationFrame(cameraAnimation);
                }
            };
            cameraAnimation();

            if (floatAnimationId) cancelAnimationFrame(floatAnimationId);
            animateFloatEffect();

            setTimeout(() => {
                CONFIG.coreRotationSpeed = originalCoreSpeed * 2.5;
                CONFIG.diskRotationSpeed = 0;
                btn.textContent = '✨Yêu Bé lắm luôn✨';
                showNotification(`🌟 Yêu bé nhất `);
            }, FLOAT_CONFIG.floatDuration);
        }

        function animateFloatEffect() {
            floatAnimationId = requestAnimationFrame(animateFloatEffect);

            imageMeshes.forEach(mesh => {
                if (mesh.userData.floating) {
                    if (mesh.userData.floatProgress < 1) {
                        mesh.userData.floatProgress += 0.005 * mesh.userData.floatSpeed;

                        const startY = mesh.userData.originalPosition.y;
                        const targetY = mesh.userData.targetHeight;
                        const t = mesh.userData.floatProgress;
                        const easeT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

                        mesh.position.y = startY + (targetY - startY) * easeT;

                        if (mesh.children[1]) {
                            mesh.children[1].rotation.copy(mesh.userData.initialRotation);
                            if (mesh.children[0]) {
                                mesh.children[0].rotation.copy(mesh.children[1].rotation);
                            }
                        }
                    }

                    const glow = mesh.children[0];
                    if (glow && glow.material) {
                        const progress = mesh.userData.floatProgress;
                        glow.material.opacity = 0.15 + 0.15 * progress;
                    }
                }
            });

            if (planetCore) {
                planetCore.rotation.y += CONFIG.coreRotationSpeed;
                planetCore.rotation.x += CONFIG.coreRotationSpeed * 0.5;
            }

            if (pinkNebulaDisk) {
                pinkNebulaDisk.rotation.y += CONFIG.diskRotationSpeed;
            }

            if (stars) {
                stars.rotation.y += CONFIG.starRotationSpeed;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function updateLoading(text, percent) {
            document.getElementById('loading-text').textContent = text;
            document.getElementById('loading-bar').style.width = percent + '%';
        }

        function showNotification(msg) {
            const el = document.getElementById('notification');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 3400);
        }

        function animate() {
            animationId = requestAnimationFrame(animate);

            if (planetCore) {
                planetCore.rotation.y += CONFIG.coreRotationSpeed;
                planetCore.rotation.x += CONFIG.coreRotationSpeed * 0.3;
            }
            if (pinkNebulaDisk) {
                pinkNebulaDisk.rotation.y += CONFIG.diskRotationSpeed;
            }
            if (stars) {
                stars.rotation.y += CONFIG.starRotationSpeed;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ====================== CHUYỂN CẢNH + KHỞI ĐỘNG ======================
        function startTransition() {
            if (transitionStarted) return;
            transitionStarted = true;

            const overlay = document.getElementById('transition-overlay');
            const transitionText = document.getElementById('transition-text');

            setTimeout(() => {
                overlay.classList.add('active');
                transitionText.classList.add('active');

                setTimeout(() => {
                    document.getElementById('valentine-section').style.display = 'none';
                    document.getElementById('universe-section').style.display = 'block';

                    initUniverse();

                    setTimeout(() => {
                        overlay.classList.remove('active');
                        transitionText.classList.remove('active');
                    }, 1000);
                }, 2000);
            }, 500);
        }

        const skipButton = document.createElement('button');
        skipButton.textContent = 'Bỏ qua, đến Vũ trụ';
        skipButton.style.cssText = `
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff3366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            cursor: pointer;
            z-index: 10002;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
            transition: all 0.3s ease;
        `;

        skipButton.onmouseover = function() {
            this.style.transform = 'translateY(-2px)';
            this.style.boxShadow = '0 6px 20px rgba(255, 51, 102, 0.6)';
        };

        skipButton.onmouseout = function() {
            this.style.transform = 'translateY(0)';
            this.style.boxShadow = '0 4px 15px rgba(255, 51, 102, 0.4)';
        };

        skipButton.onclick = function() {
            if (!transitionStarted) {
                startTransition();
                this.style.display = 'none';
            }
        };

        window.addEventListener('DOMContentLoaded', function() {
            document.body.appendChild(skipButton);

            setTimeout(function() {
                document.querySelector(".valentine-container").classList.add("active");
            }, 500);

            var openBtn = document.querySelector(".openBtn");
            var btnContainer = document.querySelector(".btnContainer");
            var cardValentine = document.querySelector(".cardValentine");
            var closeCardBtn = document.querySelector(".close-card-btn");

            openBtn.addEventListener("click", function(e) {
                e.stopPropagation();
                this.style.transform = "translateY(0) scale(0.95)";
                setTimeout(() => {
                    this.style.transform = "translateY(0) scale(1)";
                }, 150);

                cardValentine.classList.add("active");
                document.querySelector(".valentine-container").classList.add("close");

                // Ẩn nút bỏ qua để không che phần dưới lá thư
                skipButton.style.display = 'none';
            });

            if (btnContainer) {
                btnContainer.addEventListener("click", function(e) {
                    if (!e.target.closest(".openBtn")) {
                        openBtn.click();
                    }
                });
            }

            cardValentine.addEventListener("click", function(e) {
                if (e.target.closest('.close-card-btn')) return;

                if (!this.classList.contains("open")) {
                    this.classList.add("open");
                    setTimeout(effectWrite, 300);
                }
            });

            closeCardBtn.addEventListener("click", function(e) {
                e.stopPropagation();

                if (cardValentine.classList.contains("open")) {
                    cardValentine.classList.remove("open");
                    setTimeout(resetLetterContent, 200);
                }

                setTimeout(() => {
                    cardValentine.classList.remove("active");
                    document.querySelector(".valentine-container").classList.remove("close");
                    // Hiện lại nút bỏ qua khi thiệp đã đóng
                    skipButton.style.display = 'block';
                }, 300);
            });
        });

        setTimeout(() => {
            if (!transitionStarted) {
                startTransition();
            }
        }, 60000);
    </script>
</body>
</html>
